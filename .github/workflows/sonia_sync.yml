name: Sonia Artifact Sync

on:
  push:
    paths:
      - 'artifacts/**' # Triggers when new files appear in the artifacts folder
  workflow_dispatch: # Allows manual trigger from the Sonia crate

jobs:
  sync-and-repack:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push changes back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Auto-Commit AI Artifacts
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Sonia: Auto-syncing AI-generated retro assets"
          file_pattern: 'artifacts/*'

      - name: Trigger Starzip Build
        run: |
          echo "Sync complete. Starting N64/PS1 repacking process..."
          # Placeholder for Starzip CLI command
          # ./starzip --pack artifacts/ --output build/game.z64

      - name: Process Conk64 Lua Scripts
        run: |
          mkdir -p build/scripts
          for f in artifacts/*.lua; do
            echo "Validating $f for N64 runtime..."
            # Simple syntax check using Lua CLI
            luac -p "$f" 
            cp "$f" build/scripts/
          done

      - name: Bundle for Emulator
        uses: actions/upload-artifact@v4
        with:
          name: conk64-dev-build
          path: |
            build/scripts/
            artifacts/*.z64
