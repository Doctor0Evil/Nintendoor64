<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nintendoor64 · Contract-Driven Game Studio</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@fontsource/inter@4.5.15/index.min.css" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide icons -->
    <script src="https://unpkg.com/lucide@0.263.1/dist/umd/lucide.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f1117; color: #e5e7eb; }
        .glow { box-shadow: 0 0 20px rgba(79, 70, 229, 0.3); }
        .glow-sm { box-shadow: 0 0 10px rgba(79, 70, 229, 0.2); }
        .gradient-text { background: linear-gradient(135deg, #818cf8, #6366f1, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .card-bg { background: linear-gradient(180deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 17, 23, 0.9) 100%); backdrop-filter: blur(4px); }
        .border-glow { border: 1px solid rgba(99, 102, 241, 0.3); }
        .hover-lift { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .hover-lift:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.4); }
        .segment-row { transition: all 0.2s ease; cursor: pointer; }
        .segment-row:hover { background: rgba(30, 41, 59, 0.5); }
        .diff-add { background: rgba(34, 197, 94, 0.15); border-left: 3px solid #22c55e; }
        .diff-del { background: rgba(239, 68, 68, 0.15); border-left: 3px solid #ef4444; }
        .gauge-fill { transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 4px; }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
// Ensure Lucide icons are available globally
const { createIcons, icons } = window.lucide;

// Utility Icon component with proper lifecycle
const Icon = ({ name, size = 20, className = '' }) => {
    const iconRef = React.useRef(null);
    
    React.useEffect(() => {
        if (iconRef.current) {
            // Clear previous content and create new icon
            iconRef.current.innerHTML = '';
            const icon = icons[name];
            if (icon) {
                const svg = icon.toSvg({ width: size, height: size, class: className });
                iconRef.current.innerHTML = svg;
            }
        }
    }, [name, size, className]);
    
    return <span ref={iconRef} className={className} style={{ display: 'inline-flex', alignItems: 'center' }} />;
};

// ----------------------------------------------------------------------
// ROM Layout Oracle
// ----------------------------------------------------------------------
const RomLayoutOracle = () => {
    const [hoveredIdx, setHoveredIdx] = React.useState(null);
    const segments = [
        { name: 'Boot', offset: '0x000000', size: 0x10000, color: '#6366f1', usage: 'Boot code' },
        { name: 'Code', offset: '0x001000', size: 0x80000, color: '#8b5cf6', usage: 'Main game code' },
        { name: 'Textures', offset: '0x081000', size: 0x120000, color: '#3b82f6', usage: 'Asset textures' },
        { name: 'Audio', offset: '0x1A1000', size: 0x180000, color: '#10b981', usage: 'Music & SFX' },
        { name: 'Data', offset: '0x321000', size: 0x0D0000, color: '#f59e0b', usage: 'Level data' },
        { name: 'Patches', offset: '0x3F1000', size: 0x00F000, color: '#ef4444', usage: 'AI modifications' }
    ];
    const totalSize = segments.reduce((sum, s) => sum + s.size, 0);
    
    return (
        <div className="card-bg border-glow rounded-xl p-6">
            <div className="flex items-center justify-between mb-6">
                <div className="flex items-center gap-3">
                    <div className="p-2 bg-indigo-900/50 rounded-lg"><Icon name="layers" className="text-indigo-400" /></div>
                    <div>
                        <h3 className="text-lg font-semibold">ROM Layout Oracle</h3>
                        <p className="text-sm text-slate-400">Interactive segment map</p>
                    </div>
                </div>
                <div className="px-3 py-1 bg-indigo-900/30 rounded-full text-xs font-mono">4.0 MiB</div>
            </div>
            <div className="space-y-3">
                {segments.map((seg, idx) => {
                    const widthPct = (seg.size / totalSize) * 100;
                    return (
                        <div key={seg.name} 
                             className="segment-row rounded-lg p-2 -mx-2"
                             onMouseEnter={() => setHoveredIdx(idx)}
                             onMouseLeave={() => setHoveredIdx(null)}>
                            <div className="flex justify-between items-center mb-1">
                                <div className="flex items-center gap-2">
                                    <div className="w-3 h-3 rounded-full" style={{ backgroundColor: seg.color }}></div>
                                    <span className="text-sm font-medium">{seg.name}</span>
                                </div>
                                <span className="text-xs font-mono text-slate-400">{seg.offset}</span>
                            </div>
                            <div className="w-full bg-slate-800 rounded-full h-6 overflow-hidden">
                                <div className="h-full rounded-full relative" style={{ width: `${widthPct}%`, backgroundColor: seg.color }}>
                                    {hoveredIdx === idx && (
                                        <div className="absolute right-2 top-1/2 -translate-y-1/2 text-xs font-bold text-white">
                                            {widthPct.toFixed(1)}%
                                        </div>
                                    )}
                                </div>
                            </div>
                            {hoveredIdx === idx && (
                                <div className="mt-2 p-2 bg-slate-800/70 rounded text-xs">
                                    <div className="flex justify-between"><span>Size:</span><span className="font-mono">{(seg.size/1024).toFixed(0)} KiB</span></div>
                                    <div className="flex justify-between"><span>Usage:</span><span>{seg.usage}</span></div>
                                </div>
                            )}
                        </div>
                    );
                })}
            </div>
        </div>
    );
};

// ----------------------------------------------------------------------
// Safe Patch Synthesizer
// ----------------------------------------------------------------------
const SafePatchSynthesizer = () => {
    const changes = [
        { type: 'add', line: 1, code: '+ BOOT_HOOK(0x001000) → InitModernUI()' },
        { type: 'del', line: 2, code: '- BOOT_HOOK(0x001000) → SkipIntroSequence()' },
        { type: 'add', line: 3, code: '+ TEXTURE("player.ci8", VRAM_0x800) → LZSS' },
        { type: 'unchanged', line: 4, code: '  DATA("level_1.dat") → Unchanged' },
        { type: 'add', line: 5, code: '+ AUDIO("theme.mid", 0xA000) → ADPCMA' },
        { type: 'del', line: 6, code: '- AUDIO("theme.mid", 0xA000) → RawPCM' }
    ];
    return (
        <div className="card-bg border-glow rounded-xl p-6">
            <div className="flex items-center gap-3 mb-4">
                <div className="p-2 bg-green-900/50 rounded-lg"><Icon name="git-branch" className="text-green-400" /></div>
                <div>
                    <h3 className="text-lg font-semibold">Safe Patch Synthesizer</h3>
                    <p className="text-sm text-slate-400">Byte-level diff preview</p>
                </div>
            </div>
            <div className="bg-slate-900/50 rounded-lg p-3 font-mono text-sm">
                {changes.map((c, i) => (
                    <div key={i} className={`px-3 py-1.5 rounded text-xs ${c.type==='add'?'diff-add text-green-300':c.type==='del'?'diff-del text-red-300':'text-slate-400'}`}>
                        <span className="opacity-50 mr-3">{c.line}</span>{c.code}
                    </div>
                ))}
            </div>
        </div>
    );
};

// ----------------------------------------------------------------------
// Budget Planner
// ----------------------------------------------------------------------
const BudgetPlanner = () => {
    const metrics = [
        { name: 'ROM Usage', value: 78, limit: 100, unit: '%', color: '#3b82f6' },
        { name: 'RAM Usage', value: 42, limit: 64, unit: 'MiB', color: '#10b981' },
        { name: 'CPU Cycles', value: 68, limit: 100, unit: '%', color: '#f59e0b' },
        { name: 'VRAM', value: 2.4, limit: 4, unit: 'MiB', color: '#8b5cf6' }
    ];
    const [animated, setAnimated] = React.useState(metrics.map(() => 0));
    React.useEffect(() => {
        const timer = setTimeout(() => setAnimated(metrics.map(m => (m.value/m.limit)*100)), 200);
        return () => clearTimeout(timer);
    }, []);
    
    return (
        <div className="card-bg border-glow rounded-xl p-6">
            <div className="flex items-center gap-3 mb-6">
                <div className="p-2 bg-blue-900/50 rounded-lg"><Icon name="scale" className="text-blue-400" /></div>
                <div><h3 className="text-lg font-semibold">Budget Planner</h3><p className="text-sm text-slate-400">N64 constraints</p></div>
            </div>
            {metrics.map((m, i) => (
                <div key={m.name} className="mb-4">
                    <div className="flex justify-between text-sm mb-1">
                        <span>{m.name}</span>
                        <span className="font-mono">{m.value}{m.unit} / {m.limit}{m.unit}</span>
                    </div>
                    <div className="w-full bg-slate-800 rounded-full h-2.5">
                        <div className="gauge-fill h-full rounded-full" style={{ width: `${animated[i]}%`, backgroundColor: m.color }} />
                    </div>
                </div>
            ))}
        </div>
    );
};

// ----------------------------------------------------------------------
// Build Conductor (DAG)
// ----------------------------------------------------------------------
const BuildConductor = () => {
    const [steps, setSteps] = React.useState([
        { id: 1, name: 'Codegen', status: 'completed', deps: [] },
        { id: 2, name: 'Asset Pack', status: 'completed', deps: [1] },
        { id: 3, name: 'Schema Check', status: 'completed', deps: [1,2] },
        { id: 4, name: 'ROM Build', status: 'running', deps: [3] },
        { id: 5, name: 'Patch', status: 'pending', deps: [4] },
        { id: 6, name: 'Emulator', status: 'pending', deps: [5] }
    ]);
    
    React.useEffect(() => {
        const timer = setTimeout(() => {
            setSteps(prev => prev.map(s => s.id === 4 ? {...s, status: 'completed'} : s));
        }, 2000);
        return () => clearTimeout(timer);
    }, []);
    
    const nodePos = {1:[120,160], 2:[240,80], 3:[240,240], 4:[380,160], 5:[520,160], 6:[660,160]};
    const statusColor = { completed: '#22c55e', running: '#3b82f6', pending: '#475569' };
    
    return (
        <div className="card-bg border-glow rounded-xl p-6">
            <div className="flex items-center gap-3 mb-4">
                <div className="p-2 bg-indigo-900/50 rounded-lg"><Icon name="workflow" className="text-indigo-400" /></div>
                <div><h3 className="text-lg font-semibold">Build Conductor</h3><p className="text-sm text-slate-400">DAG pipeline</p></div>
            </div>
            <svg viewBox="0 0 800 300" className="w-full">
                <defs><marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#64748b"/></marker></defs>
                {/* Edges */}
                {[[1,2],[1,3],[2,3],[3,4],[4,5],[5,6]].map(([f,t],i)=> {
                    const from = nodePos[f], to = nodePos[t];
                    return <line key={i} x1={from[0]} y1={from[1]} x2={to[0]} y2={to[1]} stroke="#64748b" strokeWidth="2" markerEnd="url(#arrow)" opacity="0.6"/>;
                })}
                {/* Nodes */}
                {steps.map(s => {
                    const [cx, cy] = nodePos[s.id];
                    return (
                        <g key={s.id}>
                            <circle cx={cx} cy={cy} r="18" fill={statusColor[s.status]} />
                            <text x={cx} y={cy+5} textAnchor="middle" fill="#fff" fontSize="10" fontWeight="bold">
                                {s.status==='completed'?'✓':s.status==='running'?'⟳':''}
                            </text>
                            <text x={cx} y={cy+35} textAnchor="middle" fill="#cbd5e1" fontSize="11">{s.name}</text>
                        </g>
                    );
                })}
            </svg>
        </div>
    );
};

// ----------------------------------------------------------------------
// Scenario Director (Telemetry)
// ----------------------------------------------------------------------
const ScenarioDirector = () => {
    const [frame, setFrame] = React.useState(0);
    const [playing, setPlaying] = React.useState(false);
    const data = React.useMemo(() => Array.from({length:100}, (_,i) => ({
        awareness: 20 + 40*Math.sin(i/10) + 5*Math.random(),
        fps: 58 + 2*Math.sin(i/5)
    })), []);
    
    React.useEffect(() => {
        if (!playing) return;
        const iv = setInterval(() => setFrame(f => f>=99 ? 0 : f+1), 60);
        return () => clearInterval(iv);
    }, [playing]);
    
    const current = data[frame] || { awareness:0, fps:0 };
    
    return (
        <div className="card-bg border-glow rounded-xl p-6">
            <div className="flex items-center justify-between mb-4">
                <div className="flex items-center gap-3">
                    <div className="p-2 bg-purple-900/50 rounded-lg"><Icon name="gamepad-2" className="text-purple-400" /></div>
                    <div><h3 className="text-lg font-semibold">Scenario Director</h3><p className="text-sm text-slate-400">Awareness telemetry</p></div>
                </div>
                <button onClick={()=>setPlaying(!playing)} className="px-3 py-1.5 bg-indigo-600 rounded text-sm">{playing?'Pause':'Play'}</button>
            </div>
            <svg viewBox="0 0 400 120" className="w-full bg-slate-900/40 rounded">
                <polyline fill="none" stroke="#a78bfa" strokeWidth="2"
                    points={data.slice(0, frame+1).map((d,i) => `${i*4},${120 - d.awareness}`).join(' ')} />
                <circle cx={frame*4} cy={120 - current.awareness} r="4" fill="#c084fc" />
                <line x1={frame*4} y1="0" x2={frame*4} y2="120" stroke="#c084fc" strokeDasharray="3" opacity="0.4" />
            </svg>
            <div className="grid grid-cols-2 gap-3 mt-4">
                <div className="bg-slate-800/50 p-2 rounded"><span className="text-xs text-slate-400">Awareness</span><div className="text-lg text-purple-400">{current.awareness.toFixed(1)}</div></div>
                <div className="bg-slate-800/50 p-2 rounded"><span className="text-xs text-slate-400">FPS</span><div className="text-lg text-green-400">{current.fps.toFixed(1)}</div></div>
            </div>
        </div>
    );
};

// ----------------------------------------------------------------------
// Session Conditioning Engine
// ----------------------------------------------------------------------
const SessionConditioning = () => {
    const score = 87;
    const invariants = [
        { name: 'ROM < 32 MiB', pass: true },
        { name: 'No patch overlaps', pass: true },
        { name: 'Boot hook valid', pass: false },
        { name: 'Texture budget OK', pass: true }
    ];
    return (
        <div className="card-bg border-glow rounded-xl p-6">
            <div className="flex items-center gap-3 mb-6">
                <div className="p-2 bg-amber-900/50 rounded-lg"><Icon name="shield-check" className="text-amber-400" /></div>
                <div><h3 className="text-lg font-semibold">Session Conditioning</h3><p className="text-sm text-slate-400">Score: {score}</p></div>
            </div>
            <div className="space-y-2">
                {invariants.map((inv, i) => (
                    <div key={i} className="flex items-center justify-between p-2 bg-slate-800/50 rounded">
                        <span className="text-sm">{inv.name}</span>
                        <span className={`text-xs px-2 py-0.5 rounded ${inv.pass?'bg-green-900/50 text-green-400':'bg-red-900/50 text-red-400'}`}>{inv.pass?'PASS':'FAIL'}</span>
                    </div>
                ))}
            </div>
            <div className="mt-4 p-3 bg-red-900/20 border border-red-800 rounded text-xs text-red-300">
                <Icon name="alert-octagon" size={14} className="inline mr-1" /> Boot hook overlaps with Code segment
            </div>
        </div>
    );
};

// ----------------------------------------------------------------------
// Knowledge Graph Navigator
// ----------------------------------------------------------------------
const KnowledgeGraph = () => {
    const nodes = [
        { id: 'starzip', name: 'starzip', type: 'tool', x: 150, y: 120, color: '#3b82f6' },
        { id: 'gamemodeai', name: 'gamemodeai', type: 'tool', x: 300, y: 60, color: '#3b82f6' },
        { id: 'schemas', name: 'schemas', type: 'resource', x: 150, y: 220, color: '#22c55e' },
        { id: 'session', name: 'session', type: 'component', x: 450, y: 150, color: '#8b5cf6' },
        { id: 'kg', name: 'KG', type: 'resource', x: 300, y: 240, color: '#22c55e' }
    ];
    const edges = [['schemas','starzip'],['kg','starzip'],['schemas','gamemodeai'],['starzip','session'],['gamemodeai','session']];
    return (
        <div className="card-bg border-glow rounded-xl p-6">
            <div className="flex items-center gap-3 mb-4">
                <div className="p-2 bg-indigo-900/50 rounded-lg"><Icon name="network" className="text-indigo-400" /></div>
                <div><h3 className="text-lg font-semibold">Knowledge Graph</h3><p className="text-sm text-slate-400">System topology</p></div>
            </div>
            <svg viewBox="0 0 600 300" className="w-full">
                {edges.map(([f,t],i)=> {
                    const from = nodes.find(n=>n.id===f), to = nodes.find(n=>n.id===t);
                    return <line key={i} x1={from.x} y1={from.y} x2={to.x} y2={to.y} stroke="#64748b" strokeWidth="2" opacity="0.5"/>;
                })}
                {nodes.map(n => (
                    <g key={n.id}>
                        <circle cx={n.x} cy={n.y} r="20" fill={n.color} />
                        <text x={n.x} y={n.y+5} textAnchor="middle" fill="#fff" fontSize="10">{n.name}</text>
                    </g>
                ))}
            </svg>
        </div>
    );
};

// ----------------------------------------------------------------------
// Main App
// ----------------------------------------------------------------------
const App = () => {
    const [tab, setTab] = React.useState('overview');
    const tabs = [
        { id: 'overview', name: 'Overview', icon: 'layout' },
        { id: 'design', name: 'Design', icon: 'file-json' },
        { id: 'build', name: 'Build', icon: 'workflow' },
        { id: 'analysis', name: 'Analysis', icon: 'layers' }
    ];
    
    return (
        <div className="min-h-screen bg-slate-950">
            <header className="border-b border-slate-800 bg-slate-900/70 sticky top-0 backdrop-blur">
                <div className="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
                    <div className="flex items-center gap-3">
                        <div className="p-2 bg-gradient-to-br from-indigo-600 to-purple-700 rounded"><Icon name="cpu" className="text-white" size={24} /></div>
                        <div><h1 className="text-2xl font-bold gradient-text">Nintendoor64</h1><p className="text-xs text-slate-400">Contract-Driven Game Studio</p></div>
                    </div>
                    <div className="px-3 py-1.5 bg-indigo-900/30 rounded text-xs font-mono text-indigo-300">sonia-server:active</div>
                </div>
                <div className="max-w-7xl mx-auto px-6 flex gap-1">
                    {tabs.map(t => (
                        <button key={t.id} onClick={()=>setTab(t.id)} className={`px-4 py-2 text-sm font-medium flex items-center gap-1 border-b-2 ${tab===t.id?'border-indigo-500 text-indigo-400':'border-transparent text-slate-400'}`}>
                            <Icon name={t.icon} size={16} /> {t.name}
                        </button>
                    ))}
                </div>
            </header>
            
            <main className="max-w-7xl mx-auto px-6 py-8">
                {tab === 'overview' && (
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <RomLayoutOracle />
                        <SafePatchSynthesizer />
                        <BudgetPlanner />
                        <BuildConductor />
                        <ScenarioDirector />
                        <SessionConditioning />
                        <KnowledgeGraph />
                    </div>
                )}
                {tab === 'design' && <div className="grid grid-cols-1 lg:grid-cols-2 gap-6"><KnowledgeGraph /><div className="card-bg border-glow p-6"><h3>Schema Designer (mock)</h3></div></div>}
                {tab === 'build' && <div className="grid grid-cols-1 lg:grid-cols-2 gap-6"><BuildConductor /><SessionConditioning /></div>}
                {tab === 'analysis' && <div className="grid grid-cols-1 lg:grid-cols-2 gap-6"><RomLayoutOracle /><SafePatchSynthesizer /><BudgetPlanner /><ScenarioDirector /></div>}
            </main>
        </div>
    );
};

// Render using React 18 createRoot (safe with Babel)
const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(<App />);
</script>
</body>
</html>
